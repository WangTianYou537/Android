# Build GNU bash for Android (package: bash/)
# With readline + ncurses support.
# Actions → "Build Android bash" → Run workflow
# Release assets: per-ABI tar.gz packages with all outputs under bash/out/<ABI>/
name: Build Android bash

on:
  workflow_dispatch:
    inputs:
      bash_version:
        description: "GNU bash version (e.g. 5.2.37, 5.3)"
        required: true
        type: string
        default: "5.3"
      readline_version:
        description: "Readline version (e.g. 8.2, 8.3)"
        required: true
        type: string
        default: "8.3"
      ncurses_version:
        description: "Ncurses version (e.g. 6.4, 6.5)"
        required: true
        type: string
        default: "6.5"
      api:
        description: "Min Android API level"
        required: true
        type: string
        default: "24"
      abi_arm64:
        description: "ABI · arm64-v8a (aarch64)"
        required: true
        type: boolean
        default: true
      abi_arm:
        description: "ABI · armeabi-v7a (armv7)"
        required: true
        type: boolean
        default: true
      abi_x86_64:
        description: "ABI · x86_64"
        required: true
        type: boolean
        default: true
      abi_x86:
        description: "ABI · x86 (i686)"
        required: true
        type: boolean
        default: true
      ndk_version:
        description: "NDK release name (matches Google zip android-ndk-<name>-linux.zip)"
        required: true
        type: string
        default: "r27d"
      create_release:
        description: "Publish per-ABI tar.gz packages (all outputs under out/<ABI>/)"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: build-bash-${{ github.ref }}-${{ inputs.bash_version }}-${{ inputs.abi_arm64 }}-${{ inputs.abi_arm }}-${{ inputs.abi_x86_64 }}-${{ inputs.abi_x86 }}-${{ inputs.api }}
  cancel-in-progress: true

jobs:
  build:
    name: bash ${{ inputs.bash_version }} (readline ${{ inputs.readline_version }})
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      BASH_VER: ${{ inputs.bash_version }}
      READLINE_VER: ${{ inputs.readline_version }}
      NCURSES_VER: ${{ inputs.ncurses_version }}
      API: ${{ inputs.api }}
      NDK_VERSION: ${{ inputs.ndk_version }}
      BUILD_ROOT: ${{ github.workspace }}/.build/bash
      NDK: ${{ github.workspace }}/.ndk/android-ndk-${{ inputs.ndk_version }}
      OUT_DIR: ${{ github.workspace }}/bash/out

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve selected ABIs
        id: abis
        run: |
          set -euo pipefail
          selected=()
          [[ "${{ inputs.abi_arm64 }}"  == "true" ]] && selected+=(arm64)
          [[ "${{ inputs.abi_arm }}"    == "true" ]] && selected+=(arm)
          [[ "${{ inputs.abi_x86_64 }}" == "true" ]] && selected+=(x86_64)
          [[ "${{ inputs.abi_x86 }}"    == "true" ]] && selected+=(x86)
          if [[ ${#selected[@]} -eq 0 ]]; then
            echo "::error::Select at least one ABI checkbox (arm64 / arm / x86_64 / x86)."
            exit 1
          fi
          echo "list=${selected[*]}" >> "$GITHUB_OUTPUT"
          echo "csv=$(IFS=,; echo "${selected[*]}")" >> "$GITHUB_OUTPUT"
          echo "slug=$(IFS=-; echo "${selected[*]}")" >> "$GITHUB_OUTPUT"
          echo "Selected ABIs: ${selected[*]}"

      - name: Validate inputs
        run: |
          set -euo pipefail
          if [[ ! "$BASH_VER" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::bash_version must look like 5.2.37 or 5.3 (got: $BASH_VER)"
            exit 1
          fi
          if [[ ! "$READLINE_VER" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::readline_version must look like 8.2 (got: $READLINE_VER)"
            exit 1
          fi
          if [[ ! "$NCURSES_VER" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::ncurses_version must look like 6.4 (got: $NCURSES_VER)"
            exit 1
          fi
          if [[ ! "$API" =~ ^[0-9]+$ ]] || (( API < 21 || API > 35 )); then
            echo "::error::api must be an integer 21–35 (got: $API)"
            exit 1
          fi
          if [[ ! "$NDK_VERSION" =~ ^r[0-9]+[a-z]?$ ]]; then
            echo "::error::ndk_version must look like r27d (got: $NDK_VERSION)"
            exit 1
          fi
          test -x bash/build.sh || chmod +x bash/build.sh
          test -f bash/compat/android_compat.c
          # Sanity: build.sh must contain the Android getgrent fix
          if ! grep -q 'ANDROID_DISABLE_GRENT_PWENT' bash/build.sh; then
            echo "::error::bash/build.sh is missing ANDROID_DISABLE_GRENT_PWENT fix — update build.sh first."
            exit 1
          fi
          echo "bash=$BASH_VER readline=$READLINE_VER ncurses=$NCURSES_VER api=$API ndk=$NDK_VERSION abis=${{ steps.abis.outputs.csv }}"

      - name: Install host tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential bison wget curl file binutils pkg-config python3

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ env.NDK }}
          key: android-ndk-${{ env.NDK_VERSION }}-linux-x86_64

      - name: Download & extract NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$NDK")"
          zip="android-ndk-${NDK_VERSION}-linux.zip"
          url="https://dl.google.com/android/repository/${zip}"
          echo "Downloading $url"
          wget -q --show-progress -O "/tmp/${zip}" "$url"
          echo "Extracting..."
          unzip -q "/tmp/${zip}" -d "$(dirname "$NDK")"
          rm -f "/tmp/${zip}"
          test -x "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/clang"
          cat "$NDK/source.properties"

      - name: Cache ncurses + readline (per ABI)
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_ROOT }}/prefix-*
          key: bash-deps-rl${{ inputs.readline_version }}-nc${{ inputs.ncurses_version }}-api${{ inputs.api }}-ndk${{ inputs.ndk_version }}-${{ steps.abis.outputs.slug }}

      - name: Verify NDK
        run: |
          set -euo pipefail
          echo "NDK=$NDK"
          test -d "$NDK"
          "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/clang" --version | head -2
          ls "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin" | grep -E "aarch64-linux-android${API}-clang$" | head -3

      - name: Clean stale bash build dirs
        run: |
          set -euo pipefail
          # Never reuse old config.h / object files across workflow runs
          rm -rf "${BUILD_ROOT}/bash-build-"*
          mkdir -p "$BUILD_ROOT" "$OUT_DIR"
          echo "BUILD_ROOT=$BUILD_ROOT"
          ls -la "$BUILD_ROOT" || true

      - name: Build bash (with readline)
        run: |
          set -euo pipefail
          chmod +x bash/build.sh
          # shellcheck disable=SC2086
          ./bash/build.sh ${{ steps.abis.outputs.list }}

      - name: Dump logs on failure
        if: failure()
        run: |
          set +e
          echo "==== bash build dirs ===="
          find "$BUILD_ROOT" -maxdepth 2 -type d -name 'bash-build-*' 2>/dev/null
          for d in "$BUILD_ROOT"/bash-build-*; do
            [[ -d "$d" ]] || continue
            echo "==== $d/make.log (errors) ===="
            grep -iE 'error:|undefined symbol' "$d/make.log" 2>/dev/null | tail -40
            echo "==== $d/config.h (grent/pwent) ===="
            grep -nE 'HAVE_(GET|SET|END)(GR|PW)ENT|ANDROID_DISABLE' "$d/config.h" 2>/dev/null | tail -40
          done

      - name: Stage per-ABI tar.gz packages
        id: pack
        run: |
          set -euo pipefail
          source common/package-release.sh
          package_abi_releases bash "${BASH_VER}" bash/out
          {
            echo "bash ${BASH_VER} (readline ${READLINE_VER}, ncurses ${NCURSES_VER})"
            echo "ABIs: ${{ steps.abis.outputs.csv }}"
            echo "min Android API: ${API}"
            echo "NDK: ${NDK_VERSION}"
            echo "package: one tar.gz per ABI containing all outputs under bash/out/<ABI>/"
            echo "  (e.g. bash, BUILD_INFO.txt, terminfo/ if present)"
            echo "assets:"
            while read -r a; do echo "  - $(basename "$a")"; done < dist/asset-files.txt
            echo "built: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "commit: ${{ github.sha }}"
          } | tee dist/RELEASE_NOTES.txt
          cat dist/SUMMARY.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bash-${{ inputs.bash_version }}
          path: |
            dist/*.tar.gz
            dist/RELEASE_NOTES.txt
            dist/SUMMARY.txt
          if-no-files-found: error
          retention-days: 30

      - name: Create / update GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="bash-${BASH_VER}"
          TITLE="bash ${BASH_VER} (Android)"
          mapfile -t ASSETS < dist/asset-files.txt
          if [[ ${#ASSETS[@]} -eq 0 ]]; then
            echo "::error::No release assets"
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file dist/RELEASE_NOTES.txt
          else
            gh release create "$TAG" --title "$TITLE" --notes-file dist/RELEASE_NOTES.txt --latest=false
          fi
          for asset in "${ASSETS[@]}"; do
            echo "==> upload $(basename "$asset")"
            gh release upload "$TAG" "$asset" --clobber
          done
          gh release view "$TAG" --json assets --jq '.assets[].name'
