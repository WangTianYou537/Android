# Build GNU bash for Android (package: bash/)
# With readline + ncurses support.
# Actions → "Build Android bash" → Run workflow
# Release assets: one bare binary per ABI named bash-<version>-<abi> (no zip).
name: Build Android bash

on:
  workflow_dispatch:
    inputs:
      bash_version:
        description: "GNU bash version (e.g. 5.2.37, 5.3)"
        required: true
        type: string
        default: "5.2.37"
      readline_version:
        description: "Readline version (e.g. 8.2)"
        required: true
        type: string
        default: "8.2"
      ncurses_version:
        description: "Ncurses version (e.g. 6.4)"
        required: true
        type: string
        default: "6.4"
      api:
        description: "Min Android API level"
        required: true
        type: string
        default: "24"
      abi_arm64:
        description: "ABI · arm64-v8a (aarch64)"
        required: true
        type: boolean
        default: true
      abi_arm:
        description: "ABI · armeabi-v7a (armv7)"
        required: true
        type: boolean
        default: true
      abi_x86_64:
        description: "ABI · x86_64"
        required: true
        type: boolean
        default: true
      abi_x86:
        description: "ABI · x86 (i686)"
        required: true
        type: boolean
        default: true
      ndk_version:
        description: "NDK release name (matches Google zip android-ndk-<name>-linux.zip)"
        required: true
        type: string
        default: "r27d"
      create_release:
        description: "Publish each ABI as a separate release asset (bash-<version>-<abi>)"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: build-bash-${{ github.ref }}-${{ inputs.bash_version }}-${{ inputs.abi_arm64 }}-${{ inputs.abi_arm }}-${{ inputs.abi_x86_64 }}-${{ inputs.abi_x86 }}-${{ inputs.api }}
  cancel-in-progress: true

jobs:
  build:
    name: bash ${{ inputs.bash_version }} (readline ${{ inputs.readline_version }})
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      BASH_VER: ${{ inputs.bash_version }}
      READLINE_VER: ${{ inputs.readline_version }}
      NCURSES_VER: ${{ inputs.ncurses_version }}
      API: ${{ inputs.api }}
      NDK_VERSION: ${{ inputs.ndk_version }}
      # Shared build cache root; per-package outputs under packages' own out/
      BUILD_ROOT: ${{ github.workspace }}/.build/bash
      NDK: ${{ github.workspace }}/.ndk/android-ndk-${{ inputs.ndk_version }}
      OUT_DIR: ${{ github.workspace }}/bash/out

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve selected ABIs
        id: abis
        run: |
          set -euo pipefail
          selected=()
          [[ "${{ inputs.abi_arm64 }}"  == "true" ]] && selected+=(arm64)
          [[ "${{ inputs.abi_arm }}"    == "true" ]] && selected+=(arm)
          [[ "${{ inputs.abi_x86_64 }}" == "true" ]] && selected+=(x86_64)
          [[ "${{ inputs.abi_x86 }}"    == "true" ]] && selected+=(x86)
          if [[ ${#selected[@]} -eq 0 ]]; then
            echo "::error::Select at least one ABI checkbox (arm64 / arm / x86_64 / x86)."
            exit 1
          fi
          echo "list=${selected[*]}" >> "$GITHUB_OUTPUT"
          echo "csv=$(IFS=,; echo "${selected[*]}")" >> "$GITHUB_OUTPUT"
          echo "Selected ABIs: ${selected[*]}"

      - name: Validate inputs
        run: |
          set -euo pipefail
          if [[ ! "$BASH_VER" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::bash_version must look like 5.2.37 or 5.3 (got: $BASH_VER)"
            exit 1
          fi
          if [[ ! "$READLINE_VER" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::readline_version must look like 8.2 (got: $READLINE_VER)"
            exit 1
          fi
          if [[ ! "$NCURSES_VER" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::ncurses_version must look like 6.4 (got: $NCURSES_VER)"
            exit 1
          fi
          if [[ ! "$API" =~ ^[0-9]+$ ]] || (( API < 21 || API > 35 )); then
            echo "::error::api must be an integer 21–35 (got: $API)"
            exit 1
          fi
          if [[ ! "$NDK_VERSION" =~ ^r[0-9]+[a-z]?$ ]]; then
            echo "::error::ndk_version must look like r27d (got: $NDK_VERSION)"
            exit 1
          fi
          test -x bash/build.sh
          test -f bash/compat/android_compat.c
          echo "bash=$BASH_VER readline=$READLINE_VER ncurses=$NCURSES_VER api=$API ndk=$NDK_VERSION abis=${{ steps.abis.outputs.csv }}"

      - name: Install host tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential bison wget curl file binutils pkg-config

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ env.NDK }}
          key: android-ndk-${{ env.NDK_VERSION }}-linux-x86_64

      - name: Download & extract NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$NDK")"
          zip="android-ndk-${NDK_VERSION}-linux.zip"
          url="https://dl.google.com/android/repository/${zip}"
          echo "Downloading $url"
          wget -q --show-progress -O "/tmp/${zip}" "$url"
          echo "Extracting..."
          unzip -q "/tmp/${zip}" -d "$(dirname "$NDK")"
          rm -f "/tmp/${zip}"
          test -x "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/clang"
          cat "$NDK/source.properties"

      - name: Cache ncurses + readline (per ABI)
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_ROOT }}/prefix-*
          key: bash-deps-rl${{ inputs.readline_version }}-nc${{ inputs.ncurses_version }}-api${{ inputs.api }}-${{ steps.abis.outputs.csv }}

      - name: Verify NDK
        run: |
          set -euo pipefail
          echo "NDK=$NDK"
          test -d "$NDK"
          "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/clang" --version | head -2
          ls "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin" | grep -E "aarch64-linux-android${API}-clang$" | head -3

      - name: Build bash (with readline)
        run: |
          set -euo pipefail
          chmod +x bash/build.sh
          # shellcheck disable=SC2086
          ./bash/build.sh ${{ steps.abis.outputs.list }}

      - name: Stage per-ABI binaries
        id: pack
        run: |
          set -euo pipefail
          mkdir -p dist release-assets
          found=0
          asset_list=()

          declare -A MAP=(
            [arm64-v8a]=arm64
            [armeabi-v7a]=arm
            [x86_64]=x86_64
            [x86]=x86
          )

          for dir in arm64-v8a armeabi-v7a x86_64 x86; do
            src="bash/out/${dir}/bash"
            [[ -f "$src" ]] || continue
            short="${MAP[$dir]}"
            name="bash-${BASH_VER}-${short}"
            dest="release-assets/${name}"
            cp -a "$src" "$dest"
            chmod 755 "$dest"
            if [[ -f "bash/out/${dir}/BUILD_INFO.txt" ]]; then
              cp -a "bash/out/${dir}/BUILD_INFO.txt" "release-assets/${name}.BUILD_INFO.txt"
            fi
            # Pack terminfo if present
            if [[ -d "bash/out/${dir}/terminfo" ]]; then
              tar -cf "release-assets/${name}.terminfo.tar" -C "bash/out/${dir}" terminfo
              echo "  terminfo: release-assets/${name}.terminfo.tar"
            fi
            file "$dest" | tee -a dist/SUMMARY.txt
            ls -lh "$dest" | tee -a dist/SUMMARY.txt
            asset_list+=("$dest")
            found=1
          done

          if [[ "$found" -eq 0 ]]; then
            echo "::error::No bash binaries produced under bash/out/"
            find bash/out -type f 2>/dev/null || true
            exit 1
          fi

          {
            echo "bash ${BASH_VER}"
            echo "readline: ${READLINE_VER}"
            echo "ncurses: ${NCURSES_VER} (wide-char)"
            echo "ABIs: ${{ steps.abis.outputs.csv }}"
            echo "min Android API: ${API}"
            echo "NDK: ${NDK_VERSION}"
            echo "package: bash/"
            echo "assets:"
            for a in "${asset_list[@]}"; do
              echo "  - $(basename "$a")"
            done
            echo "built: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "runner: ${{ runner.os }} / ${{ runner.arch }}"
            echo "commit: ${{ github.sha }}"
          } | tee dist/RELEASE_NOTES.txt

          {
            for a in "${asset_list[@]}"; do
              echo "$a"
            done
            # Include terminfo tarballs in release uploads
            for f in release-assets/*.terminfo.tar; do
              [[ -f "$f" ]] && echo "$f"
            done
          } > dist/asset-files.txt

          echo "notes_path=dist/RELEASE_NOTES.txt" >> "$GITHUB_OUTPUT"
          echo "asset_count=${#asset_list[@]}" >> "$GITHUB_OUTPUT"
          ls -lh release-assets/

      - name: Upload workflow artifacts (per-ABI binaries)
        uses: actions/upload-artifact@v4
        with:
          name: bash-${{ inputs.bash_version }}-readline
          path: |
            release-assets/bash-*
            release-assets/*.terminfo.tar
            dist/RELEASE_NOTES.txt
            dist/SUMMARY.txt
          if-no-files-found: error
          retention-days: 30

      - name: Create / update GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="bash-${BASH_VER}"
          TITLE="bash ${BASH_VER} (readline ${READLINE_VER})"
          NOTES_FILE="dist/RELEASE_NOTES.txt"
          mapfile -t ASSETS < dist/asset-files.txt

          if [[ ${#ASSETS[@]} -eq 0 ]]; then
            echo "::error::No release assets staged"
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — updating notes and re-uploading assets"
            gh release edit "$TAG" --title "$TITLE" --notes-file "$NOTES_FILE"
          else
            echo "Creating release $TAG"
            gh release create "$TAG" \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE" \
              --latest=false
          fi

          for asset in "${ASSETS[@]}"; do
            name="$(basename "$asset")"
            echo "==> upload $name"
            gh release upload "$TAG" "$asset" --clobber
          done

          echo "Release $TAG assets:"
          gh release view "$TAG" --json assets --jq '.assets[].name'
