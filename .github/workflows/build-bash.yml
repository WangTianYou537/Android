# Manual build of GNU bash for Android (multi-select ABIs via checkboxes).
# Actions → "Build Android bash" → Run workflow → fill bash_version + tick ABIs.
name: Build Android bash

on:
  workflow_dispatch:
    inputs:
      bash_version:
        description: "GNU bash version (e.g. 5.2.37, 5.3)"
        required: true
        type: string
        default: "5.2.37"
      api:
        description: "Min Android API level"
        required: true
        type: string
        default: "24"
      abi_arm64:
        description: "ABI · arm64-v8a (aarch64)"
        required: true
        type: boolean
        default: true
      abi_arm:
        description: "ABI · armeabi-v7a (armv7)"
        required: true
        type: boolean
        default: true
      abi_x86_64:
        description: "ABI · x86_64"
        required: true
        type: boolean
        default: true
      abi_x86:
        description: "ABI · x86 (i686)"
        required: true
        type: boolean
        default: true
      ndk_version:
        description: "NDK release name (matches Google zip android-ndk-<name>-linux.zip)"
        required: true
        type: string
        default: "r27d"
      create_release:
        description: "Upload binaries as a GitHub Release (tag bash-<version>-<abi>)"
        required: true
        type: boolean
        default: false

permissions:
  contents: write  # needed only when create_release=true

concurrency:
  group: build-bash-${{ github.ref }}-${{ inputs.bash_version }}-${{ inputs.abi_arm64 }}-${{ inputs.abi_arm }}-${{ inputs.abi_x86_64 }}-${{ inputs.abi_x86 }}-${{ inputs.api }}
  cancel-in-progress: true

jobs:
  build:
    name: bash ${{ inputs.bash_version }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      BASH_VER: ${{ inputs.bash_version }}
      API: ${{ inputs.api }}
      NDK_VERSION: ${{ inputs.ndk_version }}
      BUILD_ROOT: ${{ github.workspace }}/.build
      NDK: ${{ github.workspace }}/.ndk/android-ndk-${{ inputs.ndk_version }}
      OUT_DIR: ${{ github.workspace }}/out

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve selected ABIs
        id: abis
        run: |
          set -euo pipefail
          selected=()
          # GitHub passes boolean inputs as the strings "true" / "false"
          [[ "${{ inputs.abi_arm64 }}"  == "true" ]] && selected+=(arm64)
          [[ "${{ inputs.abi_arm }}"    == "true" ]] && selected+=(arm)
          [[ "${{ inputs.abi_x86_64 }}" == "true" ]] && selected+=(x86_64)
          [[ "${{ inputs.abi_x86 }}"    == "true" ]] && selected+=(x86)
          if [[ ${#selected[@]} -eq 0 ]]; then
            echo "::error::Select at least one ABI checkbox (arm64 / arm / x86_64 / x86)."
            exit 1
          fi
          # space-separated for the build script
          echo "list=${selected[*]}" >> "$GITHUB_OUTPUT"
          # display: arm64,arm
          echo "csv=$(IFS=,; echo "${selected[*]}")" >> "$GITHUB_OUTPUT"
          # tag/artifact slug: single ABI as-is; all four -> "all"; else join with +
          if [[ ${#selected[@]} -eq 4 ]]; then
            slug=all
          elif [[ ${#selected[@]} -eq 1 ]]; then
            slug="${selected[0]}"
          else
            slug=$(IFS=+; echo "${selected[*]}")
          fi
          # GitHub artifact names / tags: keep slug filesystem-safe (+ is fine in tags)
          echo "slug=${slug}" >> "$GITHUB_OUTPUT"
          echo "Selected ABIs: ${selected[*]} (slug=${slug})"

      - name: Validate inputs
        run: |
          set -euo pipefail
          if [[ ! "$BASH_VER" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::bash_version must look like 5.2.37 or 5.3 (got: $BASH_VER)"
            exit 1
          fi
          if [[ ! "$API" =~ ^[0-9]+$ ]] || (( API < 21 || API > 35 )); then
            echo "::error::api must be an integer 21–35 (got: $API)"
            exit 1
          fi
          if [[ ! "$NDK_VERSION" =~ ^r[0-9]+[a-z]?$ ]]; then
            echo "::error::ndk_version must look like r27d (got: $NDK_VERSION)"
            exit 1
          fi
          echo "bash=$BASH_VER api=$API ndk=$NDK_VERSION abis=${{ steps.abis.outputs.csv }}"

      - name: Install host tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential bison wget curl file binutils

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ env.NDK }}
          key: android-ndk-${{ env.NDK_VERSION }}-linux-x86_64

      - name: Download & extract NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$NDK")"
          zip="android-ndk-${NDK_VERSION}-linux.zip"
          url="https://dl.google.com/android/repository/${zip}"
          echo "Downloading $url"
          wget -q --show-progress -O "/tmp/${zip}" "$url"
          echo "Extracting..."
          unzip -q "/tmp/${zip}" -d "$(dirname "$NDK")"
          rm -f "/tmp/${zip}"
          test -x "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/clang"
          cat "$NDK/source.properties"

      - name: Verify NDK
        run: |
          set -euo pipefail
          echo "NDK=$NDK"
          test -d "$NDK"
          "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/clang" --version | head -2
          ls "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin" | grep -E "aarch64-linux-android${API}-clang$" | head -3

      - name: Build bash
        run: |
          set -euo pipefail
          chmod +x ./build-android-bash.sh
          # shellcheck disable=SC2086
          ./build-android-bash.sh ${{ steps.abis.outputs.list }}

      - name: Collect artifacts
        id: pack
        run: |
          set -euo pipefail
          # Naming is ABI-centric: bash-<version>-<abi-slug>
          # Examples: bash-5.2.37-arm64  |  bash-5.2.37-arm64+arm  |  bash-5.2.37-all
          SLUG="${{ steps.abis.outputs.slug }}"
          BASE="bash-${BASH_VER}-${SLUG}"
          stage="dist/${BASE}"
          mkdir -p "$stage"
          found=0
          for abi in arm64-v8a armeabi-v7a x86_64 x86; do
            if [[ -f "out/${abi}/bash" ]]; then
              mkdir -p "$stage/${abi}"
              cp -a "out/${abi}/bash" "$stage/${abi}/"
              [[ -f "out/${abi}/BUILD_INFO.txt" ]] && cp -a "out/${abi}/BUILD_INFO.txt" "$stage/${abi}/"
              file "out/${abi}/bash" | tee -a "$stage/SUMMARY.txt"
              ls -lh "out/${abi}/bash" | tee -a "$stage/SUMMARY.txt"
              found=1
            fi
          done
          if [[ "$found" -eq 0 ]]; then
            echo "::error::No bash binaries produced under out/"
            find out -type f 2>/dev/null || true
            exit 1
          fi
          {
            echo "bash ${BASH_VER}"
            echo "ABI: ${{ steps.abis.outputs.csv }} (slug: ${SLUG})"
            echo "min Android API: ${API}"
            echo "NDK: ${NDK_VERSION}"
            echo "built: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "runner: ${{ runner.os }} / ${{ runner.arch }}"
            echo "commit: ${{ github.sha }}"
          } | tee "$stage/RELEASE_NOTES.txt"
          (cd dist && zip -r "${BASE}.zip" "${BASE}")
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${BASE}" >> "$GITHUB_OUTPUT"
          echo "zip_path=dist/${BASE}.zip" >> "$GITHUB_OUTPUT"
          echo "notes_path=dist/${BASE}/RELEASE_NOTES.txt" >> "$GITHUB_OUTPUT"
          ls -lh dist/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pack.outputs.artifact_name }}
          path: dist/**
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          # e.g. bash-5.2.37-arm64  |  bash-5.2.37-arm64+arm  |  bash-5.2.37-all
          tag_name: ${{ steps.pack.outputs.base }}
          name: bash ${{ inputs.bash_version }} (${{ steps.abis.outputs.csv }})
          body_path: ${{ steps.pack.outputs.notes_path }}
          files: |
            ${{ steps.pack.outputs.zip_path }}
            dist/${{ steps.pack.outputs.base }}/*/bash
          fail_on_unmatched_files: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
