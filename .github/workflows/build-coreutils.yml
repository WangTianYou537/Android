# Build official GNU coreutils for Android (package: coreutils/)
# Actions → "Build Android coreutils" → Run workflow
# Release assets: per-ABI tar.gz packages with all outputs under coreutils/out/<ABI>/
name: Build Android coreutils

on:
  workflow_dispatch:
    inputs:
      coreutils_version:
        description: "GNU coreutils version (official tarball, e.g. 9.5)"
        required: true
        type: string
        default: "9.11"
      api:
        description: "Min Android API level"
        required: true
        type: string
        default: "24"
      abi_arm64:
        description: "ABI · arm64-v8a (aarch64)"
        required: true
        type: boolean
        default: true
      abi_arm:
        description: "ABI · armeabi-v7a (armv7)"
        required: true
        type: boolean
        default: true
      abi_x86_64:
        description: "ABI · x86_64"
        required: true
        type: boolean
        default: true
      abi_x86:
        description: "ABI · x86 (i686)"
        required: true
        type: boolean
        default: true
      ndk_version:
        description: "NDK release name (android-ndk-<name>-linux.zip)"
        required: true
        type: string
        default: "r27d"
      create_release:
        description: "Publish per-ABI tar.gz packages (all outputs under out/<ABI>/)"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: build-coreutils-${{ github.ref }}-${{ inputs.coreutils_version }}-${{ inputs.abi_arm64 }}-${{ inputs.abi_arm }}-${{ inputs.abi_x86_64 }}-${{ inputs.abi_x86 }}-${{ inputs.api }}
  cancel-in-progress: true

jobs:
  build:
    name: coreutils ${{ inputs.coreutils_version }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      COREUTILS_VER: ${{ inputs.coreutils_version }}
      API: ${{ inputs.api }}
      NDK_VERSION: ${{ inputs.ndk_version }}
      BUILD_ROOT: ${{ github.workspace }}/.build/coreutils
      NDK: ${{ github.workspace }}/.ndk/android-ndk-${{ inputs.ndk_version }}
      OUT_DIR: ${{ github.workspace }}/coreutils/out

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve selected ABIs
        id: abis
        run: |
          set -euo pipefail
          selected=()
          [[ "${{ inputs.abi_arm64 }}"  == "true" ]] && selected+=(arm64)
          [[ "${{ inputs.abi_arm }}"    == "true" ]] && selected+=(arm)
          [[ "${{ inputs.abi_x86_64 }}" == "true" ]] && selected+=(x86_64)
          [[ "${{ inputs.abi_x86 }}"    == "true" ]] && selected+=(x86)
          if [[ ${#selected[@]} -eq 0 ]]; then
            echo "::error::Select at least one ABI"
            exit 1
          fi
          echo "list=${selected[*]}" >> "$GITHUB_OUTPUT"
          echo "csv=$(IFS=,; echo "${selected[*]}")" >> "$GITHUB_OUTPUT"
          echo "Selected ABIs: ${selected[*]}"

      - name: Validate inputs
        run: |
          set -euo pipefail
          if [[ ! "$COREUTILS_VER" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::coreutils_version must look like 9.5 (got: $COREUTILS_VER)"
            exit 1
          fi
          if [[ ! "$API" =~ ^[0-9]+$ ]] || (( API < 21 || API > 35 )); then
            echo "::error::api must be 21–35 (got: $API)"
            exit 1
          fi
          if [[ ! "$NDK_VERSION" =~ ^r[0-9]+[a-z]?$ ]]; then
            echo "::error::ndk_version must look like r27d"
            exit 1
          fi
          test -x coreutils/build.sh || chmod +x coreutils/build.sh
          test -f coreutils/compat/android_compat.c
          test -d coreutils/patches
          echo "coreutils=$COREUTILS_VER api=$API ndk=$NDK_VERSION abis=${{ steps.abis.outputs.csv }}"

      - name: Install host tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential bison wget curl file binutils python3

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ env.NDK }}
          key: android-ndk-${{ env.NDK_VERSION }}-linux-x86_64

      - name: Download & extract NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$NDK")"
          zip="android-ndk-${NDK_VERSION}-linux.zip"
          url="https://dl.google.com/android/repository/${zip}"
          echo "Downloading $url"
          wget -q --show-progress -O "/tmp/${zip}" "$url"
          unzip -q "/tmp/${zip}" -d "$(dirname "$NDK")"
          rm -f "/tmp/${zip}"
          test -x "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/clang"
          cat "$NDK/source.properties"

      - name: Verify NDK
        run: |
          set -euo pipefail
          "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/clang" --version | head -2
          ls "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin" | grep -E "aarch64-linux-android${API}-clang$" | head -3

      - name: Build coreutils
        run: |
          set -euo pipefail
          chmod +x coreutils/build.sh
          # shellcheck disable=SC2086
          ./coreutils/build.sh ${{ steps.abis.outputs.list }}

      - name: Stage per-ABI tar.gz packages
        id: pack
        run: |
          set -euo pipefail
          source common/package-release.sh
          package_abi_releases coreutils "${COREUTILS_VER}" coreutils/out
          {
            echo "coreutils ${COREUTILS_VER} (official GNU)"
            echo "ABIs: ${{ steps.abis.outputs.csv }}"
            echo "min Android API: ${API}"
            echo "NDK: ${NDK_VERSION}"
            echo "package: one tar.gz per ABI with bin/ multicall + BUILD_INFO.txt"
            echo "assets:"
            while read -r a; do echo "  - $(basename "$a")"; done < dist/asset-files.txt
            echo "built: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "commit: ${{ github.sha }}"
          } | tee dist/RELEASE_NOTES.txt
          cat dist/SUMMARY.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coreutils-${{ inputs.coreutils_version }}
          path: |
            dist/*.tar.gz
            dist/RELEASE_NOTES.txt
            dist/SUMMARY.txt
          if-no-files-found: error
          retention-days: 30

      - name: Create / update GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="coreutils-${COREUTILS_VER}"
          TITLE="coreutils ${COREUTILS_VER} (Android, official GNU)"
          mapfile -t ASSETS < dist/asset-files.txt
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file dist/RELEASE_NOTES.txt
          else
            gh release create "$TAG" --title "$TITLE" --notes-file dist/RELEASE_NOTES.txt --latest=false
          fi
          for asset in "${ASSETS[@]}"; do
            echo "==> upload $(basename "$asset")"
            gh release upload "$TAG" "$asset" --clobber
          done
          gh release view "$TAG" --json assets --jq '.assets[].name'
