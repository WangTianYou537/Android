# Build official OpenSSH Portable for Android (package: openssh/)
name: Build Android OpenSSH

on:
  workflow_dispatch:
    inputs:
      openssh_version:
        description: "OpenSSH portable version (e.g. 9.9p2)"
        required: true
        type: string
        default: "9.9p2"
      openssl_version:
        description: "OpenSSL version (static)"
        required: true
        type: string
        default: "3.3.3"
      zlib_version:
        description: "zlib version (static)"
        required: true
        type: string
        default: "1.3.1"
      api:
        description: "Min Android API level"
        required: true
        type: string
        default: "24"
      abi_arm64:
        description: "ABI · arm64-v8a"
        required: true
        type: boolean
        default: true
      abi_arm:
        description: "ABI · armeabi-v7a"
        required: true
        type: boolean
        default: true
      abi_x86_64:
        description: "ABI · x86_64"
        required: true
        type: boolean
        default: true
      abi_x86:
        description: "ABI · x86"
        required: true
        type: boolean
        default: true
      ndk_version:
        description: "NDK release (r27d)"
        required: true
        type: string
        default: "r27d"
      create_release:
        description: "Publish per-binary release assets"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: build-openssh-${{ github.ref }}-${{ inputs.openssh_version }}-${{ inputs.abi_arm64 }}-${{ inputs.abi_arm }}-${{ inputs.abi_x86_64 }}-${{ inputs.abi_x86 }}
  cancel-in-progress: true

jobs:
  build:
    name: openssh ${{ inputs.openssh_version }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      OPENSSH_VER: ${{ inputs.openssh_version }}
      OPENSSL_VER: ${{ inputs.openssl_version }}
      ZLIB_VER: ${{ inputs.zlib_version }}
      API: ${{ inputs.api }}
      NDK_VERSION: ${{ inputs.ndk_version }}
      BUILD_ROOT: ${{ github.workspace }}/.build/openssh
      NDK: ${{ github.workspace }}/.ndk/android-ndk-${{ inputs.ndk_version }}
      OUT_DIR: ${{ github.workspace }}/openssh/out
    steps:
      - uses: actions/checkout@v4
      - name: Resolve ABIs
        id: abis
        run: |
          set -euo pipefail
          selected=()
          [[ "${{ inputs.abi_arm64 }}" == "true" ]] && selected+=(arm64)
          [[ "${{ inputs.abi_arm }}" == "true" ]] && selected+=(arm)
          [[ "${{ inputs.abi_x86_64 }}" == "true" ]] && selected+=(x86_64)
          [[ "${{ inputs.abi_x86 }}" == "true" ]] && selected+=(x86)
          [[ ${#selected[@]} -gt 0 ]] || { echo "::error::Select an ABI"; exit 1; }
          echo "list=${selected[*]}" >> "$GITHUB_OUTPUT"
          echo "csv=$(IFS=,; echo "${selected[*]}")" >> "$GITHUB_OUTPUT"
      - name: Validate
        run: |
          set -euo pipefail
          test -x openssh/build.sh || chmod +x openssh/build.sh
          test -f openssh/compat/android_compat.c
          echo "openssh=$OPENSSH_VER openssl=$OPENSSL_VER abis=${{ steps.abis.outputs.csv }}"
      - name: Host tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential perl wget curl file binutils python3
      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ env.NDK }}
          key: android-ndk-${{ env.NDK_VERSION }}-linux-x86_64
      - name: Download NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$NDK")"
          zip="android-ndk-${NDK_VERSION}-linux.zip"
          wget -q -O "/tmp/${zip}" "https://dl.google.com/android/repository/${zip}"
          unzip -q "/tmp/${zip}" -d "$(dirname "$NDK")"
          rm -f "/tmp/${zip}"
      - name: Build
        run: |
          set -euo pipefail
          chmod +x openssh/build.sh
          # shellcheck disable=SC2086
          ./openssh/build.sh ${{ steps.abis.outputs.list }}
      - name: Stage assets
        id: pack
        run: |
          set -euo pipefail
          mkdir -p release-assets dist
          declare -A MAP=([arm64-v8a]=arm64 [armeabi-v7a]=arm [x86_64]=x86_64 [x86]=x86)
          found=0
          asset_list=()
          for dir in arm64-v8a armeabi-v7a x86_64 x86; do
            [[ -d "openssh/out/${dir}" ]] || continue
            short="${MAP[$dir]}"
            for bin in ssh scp sftp sshd ssh-keygen ssh-add ssh-agent ssh-keyscan sftp-server; do
              src="openssh/out/${dir}/${bin}"
              [[ -f "$src" ]] || continue
              name="${bin}-${OPENSSH_VER}-${short}"
              cp -a "$src" "release-assets/${name}"
              chmod 755 "release-assets/${name}"
              asset_list+=("release-assets/${name}")
              found=1
            done
            [[ -f "openssh/out/${dir}/BUILD_INFO.txt" ]] && cp -a "openssh/out/${dir}/BUILD_INFO.txt" "release-assets/BUILD_INFO-${short}.txt"
          done
          [[ $found -eq 1 ]] || { echo "::error::no binaries"; exit 1; }
          {
            echo "OpenSSH ${OPENSSH_VER}"
            echo "OpenSSL ${OPENSSL_VER} static / zlib ${ZLIB_VER} static"
            echo "ABIs: ${{ steps.abis.outputs.csv }}"
            echo "API ${API} NDK ${NDK_VERSION}"
            echo "commit ${{ github.sha }}"
            for a in "${asset_list[@]}"; do echo "  - $(basename "$a")"; done
          } | tee dist/RELEASE_NOTES.txt
          printf '%s\n' "${asset_list[@]}" > dist/asset-files.txt
          ls -lh release-assets/ | tee dist/SUMMARY.txt
      - uses: actions/upload-artifact@v4
        with:
          name: openssh-${{ inputs.openssh_version }}
          path: |
            release-assets/*
            dist/*
          retention-days: 30
      - name: Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="openssh-${OPENSSH_VER}"
          TITLE="OpenSSH ${OPENSSH_VER} (Android)"
          mapfile -t ASSETS < dist/asset-files.txt
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file dist/RELEASE_NOTES.txt
          else
            gh release create "$TAG" --title "$TITLE" --notes-file dist/RELEASE_NOTES.txt --latest=false
          fi
          for a in "${ASSETS[@]}"; do gh release upload "$TAG" "$a" --clobber; done
