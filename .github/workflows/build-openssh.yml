# Build official OpenSSH Portable for Android (package: openssh/)
name: Build Android OpenSSH

on:
  workflow_dispatch:
    inputs:
      openssh_version:
        description: "OpenSSH portable version (e.g. 9.9p2)"
        required: true
        type: string
        default: "9.9p2"
      openssl_version:
        description: "OpenSSL version (static)"
        required: true
        type: string
        default: "3.3.3"
      zlib_version:
        description: "zlib version (static)"
        required: true
        type: string
        default: "1.3.1"
      api:
        description: "Min Android API level"
        required: true
        type: string
        default: "24"
      abi_arm64:
        description: "ABI · arm64-v8a"
        required: true
        type: boolean
        default: true
      abi_arm:
        description: "ABI · armeabi-v7a"
        required: true
        type: boolean
        default: true
      abi_x86_64:
        description: "ABI · x86_64"
        required: true
        type: boolean
        default: true
      abi_x86:
        description: "ABI · x86"
        required: true
        type: boolean
        default: true
      ndk_version:
        description: "NDK release (r27d)"
        required: true
        type: string
        default: "r27d"
      create_release:
        description: "Publish per-ABI tar.gz packages (all outputs under out/<ABI>/)"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: build-openssh-${{ github.ref }}-${{ inputs.openssh_version }}-${{ inputs.abi_arm64 }}-${{ inputs.abi_arm }}-${{ inputs.abi_x86_64 }}-${{ inputs.abi_x86 }}
  cancel-in-progress: true

jobs:
  build:
    name: openssh ${{ inputs.openssh_version }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      OPENSSH_VER: ${{ inputs.openssh_version }}
      OPENSSL_VER: ${{ inputs.openssl_version }}
      ZLIB_VER: ${{ inputs.zlib_version }}
      API: ${{ inputs.api }}
      NDK_VERSION: ${{ inputs.ndk_version }}
      BUILD_ROOT: ${{ github.workspace }}/.build/openssh
      NDK: ${{ github.workspace }}/.ndk/android-ndk-${{ inputs.ndk_version }}
      OUT_DIR: ${{ github.workspace }}/openssh/out
    steps:
      - uses: actions/checkout@v4
      - name: Resolve ABIs
        id: abis
        run: |
          set -euo pipefail
          selected=()
          [[ "${{ inputs.abi_arm64 }}" == "true" ]] && selected+=(arm64)
          [[ "${{ inputs.abi_arm }}" == "true" ]] && selected+=(arm)
          [[ "${{ inputs.abi_x86_64 }}" == "true" ]] && selected+=(x86_64)
          [[ "${{ inputs.abi_x86 }}" == "true" ]] && selected+=(x86)
          [[ ${#selected[@]} -gt 0 ]] || { echo "::error::Select an ABI"; exit 1; }
          echo "list=${selected[*]}" >> "$GITHUB_OUTPUT"
          echo "csv=$(IFS=,; echo "${selected[*]}")" >> "$GITHUB_OUTPUT"
      - name: Validate
        run: |
          set -euo pipefail
          test -x openssh/build.sh || chmod +x openssh/build.sh
          test -f openssh/compat/android_compat.c
          echo "openssh=$OPENSSH_VER openssl=$OPENSSL_VER abis=${{ steps.abis.outputs.csv }}"
      - name: Host tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential perl wget curl file binutils python3
      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ env.NDK }}
          key: android-ndk-${{ env.NDK_VERSION }}-linux-x86_64
      - name: Download NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$NDK")"
          zip="android-ndk-${NDK_VERSION}-linux.zip"
          wget -q -O "/tmp/${zip}" "https://dl.google.com/android/repository/${zip}"
          unzip -q "/tmp/${zip}" -d "$(dirname "$NDK")"
          rm -f "/tmp/${zip}"
      - name: Build
        run: |
          set -euo pipefail
          chmod +x openssh/build.sh
          # shellcheck disable=SC2086
          ./openssh/build.sh ${{ steps.abis.outputs.list }}
      - name: Stage per-ABI tar.gz packages
        id: pack
        run: |
          set -euo pipefail
          source common/package-release.sh
          package_abi_releases openssh "${OPENSSH_VER}" openssh/out
          {
            echo "OpenSSH ${OPENSSH_VER}"
            echo "OpenSSL ${OPENSSL_VER} / zlib ${ZLIB_VER}"
            echo "ABIs: ${{ steps.abis.outputs.csv }}"
            echo "min Android API: ${API}"
            echo "NDK: ${NDK_VERSION}"
            echo "package: one tar.gz per ABI with all ssh binaries + BUILD_INFO.txt (+ lib/ if dynamic)"
            echo "assets:"
            while read -r a; do echo "  - $(basename "$a")"; done < dist/asset-files.txt
            echo "built: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "commit: ${{ github.sha }}"
          } | tee dist/RELEASE_NOTES.txt
          cat dist/SUMMARY.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openssh-${{ inputs.openssh_version }}
          path: |
            dist/*.tar.gz
            dist/RELEASE_NOTES.txt
            dist/SUMMARY.txt
          if-no-files-found: error
          retention-days: 30

      - name: Create / update GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="openssh-${OPENSSH_VER}"
          TITLE="OpenSSH ${OPENSSH_VER} (Android)"
          mapfile -t ASSETS < dist/asset-files.txt
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file dist/RELEASE_NOTES.txt
          else
            gh release create "$TAG" --title "$TITLE" --notes-file dist/RELEASE_NOTES.txt --latest=false
          fi
          for asset in "${ASSETS[@]}"; do
            echo "==> upload $(basename "$asset")"
            gh release upload "$TAG" "$asset" --clobber
          done
          gh release view "$TAG" --json assets --jq '.assets[].name'
